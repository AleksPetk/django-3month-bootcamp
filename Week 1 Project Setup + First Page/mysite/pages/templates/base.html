<!DOCTYPE html>
<html>
    <head>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}My Website{% endblock %}
        </title>
    </head>
    <body>
        <header>
            <h1>My Website</h1>
            <h2>{% block header_page %}{% endblock %}</h2>
            {% include "_nav.html" %}
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
        {% include "_footer.html" %}
    </body>
</html>
