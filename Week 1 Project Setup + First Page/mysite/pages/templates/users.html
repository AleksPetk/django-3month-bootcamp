<!DOCTYPE html>
<html>
    <head>
        <title>Users</title>
    </head>
    <body>
        <pre>{{ users }}</pre>
        <h1>Active Users</h1>
        <ul>
            {% for user in users %}
                {% if user.active %}
                    <li>Name: {{user.name}} | Status: Active</li>
                {% endif %}
            {% endfor %}
        </ul>
    </body>
</html>
