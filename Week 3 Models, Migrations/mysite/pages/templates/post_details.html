{% extends "base.html" %}

{% block title %}{{post.title}}{% endblock %}

{% block content %}
    <h2>{{post.title}}</h2>
    <article>
        <h3>{{post.title}}</h3>
        <small>Published: {{post.created_at}}</small>
        <hr>
        <p>{{post.content|linebreaks}}</p>
        <p>
            <a href="{% url 'posts' %}">Back to Posts</a>
        </p>
    </article>

{% endblock %}
