{% extends "base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}

<h2>All Posts</h2>
<form method="GET">
    <input type="text" name="q" placeholder="Search title">
    <button type="submit">Search</button>
</form>
<ul>
    {% for post in posts %}
        <li>
            <a href="{% url 'post_details' post.id %}">
                {{post.title}}
            </a>
        </li>
        {% empty %}
            <li>No posts yet.</li>
        {% endfor %}
</ul>

{% endblock %}
