{% extends "base.html" %}

{% block title %}Books{% endblock %}

{% block content %}

<h2>Books</h2>
<div class="books">
    <p>Total published: {{books|length}}</p>
    <ul>
        {% for book in books %}
            <li>
                {{book.title}} - <a href="{% url 'book_details' book.id %}">Info Here</a>
            </li>
        {% empty %}
            <li>No books yet!</li>
        {% endfor %}
    </ul>
</div>

{% endblock %}
